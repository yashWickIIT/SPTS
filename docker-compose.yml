services:
  spts:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spts-container
    ports:
      - "8000:8000"
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data:ro
      # Optional custom database override
      # - ./custom_db:/app/custom_db:ro
    environment:
      - SPTS_MAIN_DB_PATH=/app/data/bird_mini_dev.sqlite
      - SPTS_USERS_DB_PATH=/app/sessions/users.sqlite
      # If using custom DB, set SPTS_MAIN_DB_PATH in .env to /app/custom_db/<your_db>.sqlite
    env_file:
      - .env
    restart: unless-stopped
