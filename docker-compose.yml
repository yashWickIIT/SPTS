services:
  spts:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spts-container
    ports:
      - "8000:8000"
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data:ro
      # Optional custom database override
      # - ./custom_db:/app/custom_db:ro
    environment:
      - SPTS_USERS_DB_PATH=/app/sessions/users.sqlite
      # Set SPTS_MAIN_DB_PATH or SPTS_DATABASE_URL in .env for the main query database.
    env_file:
      - .env
    restart: unless-stopped
