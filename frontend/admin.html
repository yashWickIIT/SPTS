<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPTS Admin Portal</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container" style="max-width: 520px; margin-top: 60px;">
      <header style="margin-bottom: 1.5rem; text-align: left;">
        <h1>Admin Portal</h1>
        <div class="subtitle">Create privileged users via /admin/register</div>
      </header>

      <div class="card">
        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="username" style="display:block; margin-bottom:0.5rem; font-weight:500;">Username</label>
          <input id="username" type="text" placeholder="new username" style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:0.5rem; box-sizing:border-box;" />
        </div>

        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="password" style="display:block; margin-bottom:0.5rem; font-weight:500;">Password</label>
          <input id="password" type="password" placeholder="new password" style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:0.5rem; box-sizing:border-box;" />
        </div>

        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="role" style="display:block; margin-bottom:0.5rem; font-weight:500;">Role</label>
          <select id="role" style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:0.5rem; box-sizing:border-box;">
            <option value="admin">Admin</option>
            <option value="developer">Developer</option>
            <option value="qa">Quality Assurance</option>
            <option value="engineer">Engineer</option>
            <option value="analyst">Analyst</option>
            <option value="manager">Manager</option>
            <option value="researcher">Researcher</option>
          </select>
        </div>

        <button id="createBtn" onclick="createAdminUser()" style="width:100%; margin-bottom:0.75rem;">Create User</button>
        <div id="error-msg" style="display:none; color:#ef4444; font-size:0.875rem; margin-bottom:0.75rem;"></div>
        <div id="success-msg" style="display:none; color:#10b981; font-size:0.875rem; margin-bottom:0.75rem;"></div>

        <div style="display:flex; gap:0.75rem;">
          <button onclick="backToApp()" style="flex:1; background:none; color:var(--text); border:1px solid var(--border);">Back</button>
          <button onclick="logout()" style="flex:1; background:none; color:var(--text); border:1px solid var(--border);">Logout</button>
        </div>
      </div>
    </div>

    <script src="/static/admin.js"></script>
  </body>
</html>
