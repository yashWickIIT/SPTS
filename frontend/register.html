<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPTS Registration</title>
    <link rel="icon" type="image/png" href="/static/S.png" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
      <header style="margin-bottom: 2rem; text-align: center;">
        <img src="/static/S.png" alt="SPTS Logo" style="height: 64px; width: 64px; object-fit: contain; margin-bottom: 0.75rem;" />
        <h1>SPTS Registration</h1>
        <div class="subtitle">Create a new account to experiment</div>
      </header>

      <div class="card">
        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
          <input type="text" id="username" placeholder="Choose a username" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; box-sizing: border-box;" />
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
          <input type="password" id="password" placeholder="Choose a password" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; box-sizing: border-box;" />
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="role" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Role</label>
          <select id="role" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; box-sizing: border-box;">
            <option value="analyst" selected>Analyst</option>
            <option value="manager">Manager</option>
            <option value="researcher">Researcher</option>
            <option value="developer">Developer</option>
            <option value="qa">Quality Assurance</option>
            <option value="engineer">Engineer</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button id="registerBtn" onclick="register()" style="width: 100%; margin-bottom: 1rem;">Register</button>
        <div id="error-msg" style="color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>
        <div id="success-msg" style="color: #10b981; font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>
        <div style="text-align: center; font-size: 0.875rem; color: #64748b;">
          Already have an account? <a href="/static/login.html" style="color: #3b82f6; text-decoration: none;">Log in here</a>
        </div>
      </div>
    </div>
    <script src="/static/register.js"></script>
  </body>
</html>
