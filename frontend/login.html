<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPTS Login</title>
    <link rel="icon" type="image/png" href="/static/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
      <header style="margin-bottom: 2rem; text-align: center;">
        <img src="/static/logo.png" alt="SPTS Logo" style="height: 64px; width: 64px; object-fit: contain; margin-bottom: 0.75rem;" />
        <h1>SPTS Login</h1>
        <div class="subtitle">Please enter your credentials to continue</div>
      </header>

      <div class="card">
        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
          <input type="text" id="username" placeholder="Enter username" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; box-sizing: border-box;" />
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
          <input type="password" id="password" placeholder="Enter password" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; box-sizing: border-box;" />
        </div>
        <button id="loginBtn" onclick="login()" style="width: 100%; margin-bottom: 1rem;">Log In</button>
        <div id="error-msg" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>
        <div style="text-align: center; font-size: 0.875rem; color: var(--text-muted);">
          Don't have an account? <a href="/static/register.html" style="color: var(--secondary); text-decoration: none;">Register here</a>
        </div>
      </div>
    </div>
    <script src="/static/login.js"></script>
  </body>
</html>
